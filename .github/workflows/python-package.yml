# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6.0.2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
          pytest \
          tox
        cp tests/config-ci.py config.py

    - name: Test on ${{ matrix.python-version }}
      run: |
        tox -e py

    - name: Check Distribution
      if: ${{ matrix.python-version == '3.12' }}
      run: |
        tox -e dist-check

    - name: Codestyle
      if: ${{ matrix.python-version == '3.12' }}
      run: |
        tox -e codestyle

    - name: Security
      if: ${{ matrix.python-version == '3.12' }}
      run: |
        tox -e security

    - name: Docs
      if: ${{ matrix.python-version == '3.12' }}
      run: |
        tox -e docs

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (Multi-platform validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build (Native load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: errbot-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm errbot-test:latest --version
          docker run --rm errbot-test:latest --help


